<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{:: .content})}">
<body>
    <div class="content" th:fragment="content">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
            <div class="mb-8">
                <h1 class="text-3xl font-bold gold-text mb-2">Selamat Datang, <span th:text="${user.fullName}">User</span>!</h1>
                <p class="text-zinc-400">Mulai perjalanan transformasi Anda hari ini</p>
            </div>

            <!-- Quick Stats -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12">
                <div class="bg-zinc-900 rounded-xl p-6 border border-zinc-800">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-zinc-400 text-sm">Program 90 Hari</p>
                            <p class="text-2xl font-bold gold-text">Aktif</p>
                        </div>
                        <div class="w-12 h-12 bg-gold-600/20 rounded-full flex items-center justify-center">
                            <svg class="w-6 h-6 text-gold-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path>
                            </svg>
                        </div>
                    </div>
                </div>
                <div class="bg-zinc-900 rounded-xl p-6 border border-zinc-800">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-zinc-400 text-sm">Ebook Dibeli</p>
                            <p class="text-2xl font-bold gold-text">0</p>
                        </div>
                        <div class="w-12 h-12 bg-gold-600/20 rounded-full flex items-center justify-center">
                            <svg class="w-6 h-6 text-gold-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path>
                            </svg>
                        </div>
                    </div>
                </div>
                <div class="bg-zinc-900 rounded-xl p-6 border border-zinc-800">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-zinc-400 text-sm">Hari Program</p>
                            <p class="text-2xl font-bold gold-text">1/90</p>
                        </div>
                        <div class="w-12 h-12 bg-gold-600/20 rounded-full flex items-center justify-center">
                            <svg class="w-6 h-6 text-gold-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
                            </svg>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Quick Actions -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <a th:href="@{/app/timeboxing}" class="bg-zinc-900 rounded-xl p-6 border border-zinc-800 hover:border-gold-500 transition group">
                    <div class="flex items-center space-x-4">
                        <div class="w-16 h-16 gold-gradient rounded-lg flex items-center justify-center">
                            <svg class="w-8 h-8 text-zinc-900" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                            </svg>
                        </div>
                        <div>
                            <h3 class="text-xl font-semibold group-hover:text-gold-400 transition">Program 90 Hari</h3>
                            <p class="text-zinc-400">Lanjutkan perjalanan transformasi Anda</p>
                        </div>
                    </div>
                </a>

                <a th:href="@{/app/generator}" class="bg-zinc-900 rounded-xl p-6 border border-zinc-800 hover:border-gold-500 transition group">
                    <div class="flex items-center space-x-4">
                        <div class="w-16 h-16 gold-gradient rounded-lg flex items-center justify-center">
                            <svg class="w-8 h-8 text-zinc-900" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"></path>
                            </svg>
                        </div>
                        <div>
                            <h3 class="text-xl font-semibold group-hover:text-gold-400 transition">Skill Synthesizer</h3>
                            <p class="text-zinc-400">Analisis dan kembangkan potensi Anda</p>
                        </div>
                    </div>
                </a>
            </div>
        </div>
    </div>
</body>
</html>
