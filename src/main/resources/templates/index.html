<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{:: .content})}">
<body>
    <div class="content" th:fragment="content">
        <!-- Hero Section -->
        <section class="gold-gradient py-20">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
                <h1 class="text-4xl md:text-6xl font-bold text-zinc-900 mb-4">
                    Transformasi Diri Anda Dimulai Di Sini
                </h1>
                <p class="text-xl text-zinc-800 mb-8">
                    Temukan ebook yang akan mengubah cara Anda melihat dunia dan diri sendiri
                </p>
                <a href="#catalog" class="inline-block bg-zinc-900 text-white px-8 py-3 rounded-lg font-semibold hover:bg-zinc-800 transition">
                    Lihat Katalog
                </a>
            </div>
        </section>

        <!-- Catalog Section -->
        <section id="catalog" class="py-16 bg-zinc-950">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <h2 class="text-3xl font-bold text-center mb-12 gold-text">Katalog Ebook</h2>
                
                <!-- Empty State -->
                <div th:if="${ebooks == null or ebooks.isEmpty()}" class="text-center py-12">
                    <div class="bg-zinc-900 rounded-xl p-8 border border-zinc-800 max-w-2xl mx-auto">
                        <svg class="w-16 h-16 text-zinc-600 mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path>
                        </svg>
                        <h3 class="text-xl font-semibold text-zinc-300 mb-2">Belum ada ebook</h3>
                        <p class="text-zinc-400 mb-4">Silakan upload melalui menu Admin</p>
                        <a th:href="@{/admin/upload}" class="inline-block gold-gradient text-zinc-900 px-6 py-2 rounded-lg font-semibold hover:opacity-90 transition">
                            Upload Ebook Sekarang
                        </a>
                    </div>
                </div>

                <div th:unless="${ebooks == null or ebooks.isEmpty()}" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                    <div th:each="ebook : ${ebooks}" class="bg-zinc-900 rounded-xl overflow-hidden border border-zinc-800 hover:border-gold-500 transition group">
                        <div class="h-48 bg-zinc-800 flex items-center justify-center overflow-hidden">
                            <div th:if="${ebook.coverImageUrl}" class="w-full h-full overflow-hidden">
                                <img th:src="${ebook.coverImageUrl}" th:alt="${ebook.title}" class="w-full h-full object-cover">
                            </div>
                            <div th:unless="${ebook.coverImageUrl}" class="text-zinc-600">
                                <svg class="w-16 h-16 mx-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5,7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18,7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5,16.5 5c1.747 0,3.332.477 4.5 1.253v13C19.832 18.477 18.247 18,16.5 18c-1.746 0-3.332.477-4.5 1.253"></path>
                                </svg>
                            </div>
                        </div>
                        <div class="p-6">
                            <h3 class="text-xl font-semibold mb-2 group-hover:text-gold-400 transition" th:text="${ebook.title}">Judul Ebook</h3>
                            <p class="text-zinc-400 mb-4 line-clamp-2" th:text="${ebook.description}">Deskripsi ebook</p>
                            <div class="flex justify-between items-center">
                                <span class="text-2xl font-bold gold-text" th:text="'Rp ' + ${ebook.price}">Rp 0</span>
                                <a th:href="@{/ebook/{slug}(slug=${ebook.slug})}" class="bg-gold-600 hover:bg-gold-500 text-white px-4 py-2 rounded-lg transition">
                                    Lihat Detail
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
                </div>
            </div>
        </section>
    </div>
</body>
</html>
