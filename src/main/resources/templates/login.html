<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - EbookMurah Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        zinc: { 950: '#09090b', 900: '#18181b', 800: '#27272a', 700: '#3f3f46' },
                        gold: { 400: '#fbbf24', 500: '#f59e0b', 600: '#d97706' }
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #09090b; }
        .gold-gradient { background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 50%, #d97706 100%); }
        .gold-text { background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 50%, #d97706 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center bg-zinc-950">
    <div class="max-w-md w-full mx-4">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold gold-text mb-2">EbookMurah Store</h1>
            <p class="text-zinc-400">Masuk ke akun Anda</p>
        </div>

        <div class="bg-zinc-900 rounded-xl p-8 border border-zinc-800">
            <div th:if="${param.error}" class="mb-4 p-3 bg-red-900/30 border border-red-700 rounded-lg text-red-400">
                Email atau password salah
            </div>
            <div th:if="${param.logout}" class="mb-4 p-3 bg-green-900/30 border border-green-700 rounded-lg text-green-400">
                Anda telah logout
            </div>

            <form th:action="@{/login}" method="post">
                <div class="mb-4">
                    <label class="block text-zinc-300 mb-2">Email</label>
                    <input type="email" name="username" required class="w-full bg-zinc-800 border border-zinc-700 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-gold-500 transition">
                </div>
                <div class="mb-6">
                    <label class="block text-zinc-300 mb-2">Password</label>
                    <input type="password" name="password" required class="w-full bg-zinc-800 border border-zinc-700 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-gold-500 transition">
                </div>
                <button type="submit" class="w-full gold-gradient text-zinc-900 font-bold py-3 rounded-lg hover:opacity-90 transition">
                    Login
                </button>
            </form>

            <div class="mt-6 text-center">
                <p class="text-zinc-400">Belum punya akun? <a th:href="@{/register}" class="text-gold-400 hover:text-gold-500">Daftar</a></p>
            </div>
        </div>
    </div>
</body>
</html>
