<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org" th:fragment="layout(content)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} ?: 'EbookMurah Store'">EbookMurah Store</title>
    
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        .gold-gradient { background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 50%, #d97706 100%) !important; }
        .gold-text { 
            background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 50%, #d97706 100%) !important; 
            -webkit-background-clip: text !important; 
            -webkit-text-fill-color: transparent !important;
            background-clip: text !important;
        }
        body { background-color: #09090b !important; color: #fafafa !important; }
    </style>
</head>
<body class="bg-[#09090b] text-[#fafafa] min-h-screen">
    <nav class="bg-zinc-900 border-b border-zinc-800">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <a th:href="@{/}" class="flex items-center">
                <span class="text-2xl font-bold gold-text">EbookMurah</span>
                <span class="ml-2 text-zinc-400">.store</span>
            </a>
            <div class="flex items-center space-x-6">
                <a th:href="@{/}" class="text-zinc-300 hover:text-gold-400 transition">Katalog Ebook</a>
                <div sec:authorize="isAuthenticated()" class="flex items-center space-x-4">
                    <a th:href="@{/app/dashboard}" class="text-zinc-300 hover:text-gold-400 transition">Dashboard</a>
                    <a th:href="@{/app/generator}" class="text-zinc-300 hover:text-gold-400 transition">Skill Analyzer</a>
                    <a th:href="@{/app/timeboxing}" class="text-zinc-300 hover:text-gold-400 transition">Program 90 Hari</a>
                    <a th:href="@{/logout}" class="text-zinc-300 hover:text-gold-400 transition">Logout</a>
                </div>
                <div sec:authorize="isAnonymous()" class="flex items-center space-x-4">
                    <a th:href="@{/login}" class="text-zinc-300 hover:text-gold-400 transition">Login</a>
                    <a th:href="@{/register}" class="gold-gradient text-zinc-900 px-4 py-2 rounded-lg font-semibold hover:opacity-90 transition">Daftar</a>
                </div>
            </div>
        </div>
    </nav>

    <div th:replace="${content}"></div>

    <footer class="bg-zinc-900 border-t border-zinc-800 py-8 mt-12 text-center text-zinc-400">
        <p>&copy; 2024 EbookMurah Store</p>
    </footer>
</body>
</html>
