<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{:: .content})}">
<body>
    <div class="content" th:fragment="content">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
            <!-- Breadcrumb -->
            <nav class="mb-8">
                <ol class="flex items-center space-x-2 text-zinc-400">
                    <li><a th:href="@{/}" class="hover:text-gold-400">Home</a></li>
                    <li>/</li>
                    <li class="text-zinc-200" th:text="${ebook.title}">Judul Ebook</li>
                </ol>
            </nav>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-12">
                <!-- Cover Image -->
                <div class="bg-zinc-900 rounded-xl overflow-hidden border border-zinc-800">
                    <div class="aspect-[3/4] flex items-center justify-center">
                        <div th:if="${ebook.coverImageUrl}">
                            <img th:src="${ebook.coverImageUrl}" th:alt="${ebook.title}" class="w-full h-full object-cover">
                        </div>
                        <div th:unless="${ebook.coverImageUrl}" class="text-zinc-600">
                            <svg class="w-32 h-32 mx-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path>
                            </svg>
                        </div>
                    </div>
                </div>

                <!-- Details -->
                <div>
                    <h1 class="text-4xl font-bold mb-4 gold-text" th:text="${ebook.title}">Judul Ebook</h1>
                    <p class="text-zinc-400 mb-6" th:text="${ebook.description}">Deskripsi</p>
                    
                    <div class="text-4xl font-bold mb-8 gold-text" th:text="'Rp ' + ${ebook.price}">Rp 0</div>

                    <!-- 5 Phase Narrative -->
                    <div class="space-y-6 mb-8">
                        <div class="bg-zinc-900 p-4 rounded-lg border-l-4 border-gold-500">
                            <h3 class="font-semibold text-gold-400 mb-2">Fase 1: Menggali Luka</h3>
                            <p class="text-zinc-300 text-sm" th:text="${ebook.phase1Narrative}">Narasi fase 1</p>
                        </div>
                        <div class="bg-zinc-900 p-4 rounded-lg border-l-4 border-gold-500">
                            <h3 class="font-semibold text-gold-400 mb-2">Fase 2: Instal Mindset</h3>
                            <p class="text-zinc-300 text-sm" th:text="${ebook.phase2Narrative}">Narasi fase 2</p>
                        </div>
                        <div class="bg-zinc-900 p-4 rounded-lg border-l-4 border-gold-500">
                            <h3 class="font-semibold text-gold-400 mb-2">Fase 3: Strategi Potensi</h3>
                            <p class="text-zinc-300 text-sm" th:text="${ebook.phase3Narrative}">Narasi fase 3</p>
                        </div>
                        <div class="bg-zinc-900 p-4 rounded-lg border-l-4 border-gold-500">
                            <h3 class="font-semibold text-gold-400 mb-2">Fase 4: Titik Balik</h3>
                            <p class="text-zinc-300 text-sm" th:text="${ebook.phase4Narrative}">Narasi fase 4</p>
                        </div>
                        <div class="bg-zinc-900 p-4 rounded-lg border-l-4 border-gold-500">
                            <h3 class="font-semibold text-gold-400 mb-2">Fase 5: Transformasi</h3>
                            <p class="text-zinc-300 text-sm" th:text="${ebook.phase5Narrative}">Narasi fase 5</p>
                        </div>
                    </div>

                    <!-- Payment Options -->
                    <div class="bg-zinc-900 p-6 rounded-xl border border-zinc-800">
                        <h3 class="text-xl font-semibold mb-4">Pilih Metode Pembayaran</h3>
                        <form th:action="@{/payment/create}" method="post">
                            <input type="hidden" name="ebookId" th:value="${ebook.id}">
                            
                            <div class="space-y-3 mb-6">
                                <label class="flex items-center p-3 bg-zinc-800 rounded-lg cursor-pointer hover:bg-zinc-700 transition">
                                    <input type="radio" name="paymentMethod" value="qris" class="mr-3" checked>
                                    <span>QRIS (Scan QR Code)</span>
                                </label>
                                <label class="flex items-center p-3 bg-zinc-800 rounded-lg cursor-pointer hover:bg-zinc-700 transition">
                                    <input type="radio" name="paymentMethod" value="va" class="mr-3">
                                    <span>Virtual Account (BCA, BNI, BRI, Mandiri)</span>
                                </label>
                                <label class="flex items-center p-3 bg-zinc-800 rounded-lg cursor-pointer hover:bg-zinc-700 transition">
                                    <input type="radio" name="paymentMethod" value="ewallet" class="mr-3">
                                    <span>E-Wallet (GoPay, OVO, DANA, ShopeePay)</span>
                                </label>
                            </div>

                            <button type="submit" class="w-full gold-gradient text-zinc-900 font-bold py-3 rounded-lg hover:opacity-90 transition">
                                Beli Sekarang
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
