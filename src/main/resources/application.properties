# Server Configuration
server.port=${SERVER_PORT:8080}
spring.application.name=ebookmurah-store

# Database Configuration
# Choose one: mysql, postgresql, or h2
spring.datasource.driver-class-name=${DB_DRIVER:com.mysql.cj.jdbc.Driver}
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/ebookmurah?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Asia/Jakarta}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=${DB_DIALECT:org.hibernate.dialect.MySQLDialect}
spring.jpa.properties.hibernate.format_sql=true

# H2 Console (for development only, disable in production)
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:false}
spring.h2.console.path=/h2-console

# Thymeleaf Configuration
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML

# Mail Configuration
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Midtrans Configuration
midtrans.server.key=${MIDTRANS_SERVER_KEY:}
midtrans.client.key=${MIDTRANS_CLIENT_KEY:}
midtrans.api.url=${MIDTRANS_API_URL:https://app.sandbox.midtrans.com/snap/v1}
midtrans.payment.notification.url=${MIDTRANS_NOTIFICATION_URL:https://ebookmurah.store/api/payment/notification}
midtrans.payment.finish.url=${MIDTRANS_FINISH_URL:https://ebookmurah.store/payment/success}
midtrans.payment.unfinish.url=${MIDTRANS_UNFINISH_URL:https://ebookmurah.store/payment/unfinish}
midtrans.payment.error.url=${MIDTRANS_ERROR_URL:https://ebookmurah.store/payment/error}

# JWT Secret (for token generation if needed)
app.jwt.secret=${JWT_SECRET:your-secret-key-change-this-in-production}
app.jwt.expiration=${JWT_EXPIRATION:86400000}

# File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Logging
logging.level.com.ebookmurah=INFO
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG
