# Server Configuration
server.port=${SERVER_PORT:8080}
spring.application.name=ebookmurah-store

# Database Configuration
# Railway PostgreSQL
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.generate-ddl=true
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=${DB_DIALECT:org.hibernate.dialect.PostgreSQLDialect}
spring.jpa.properties.hibernate.format_sql=true

# H2 Console (for development only, disable in production)
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:false}
spring.h2.console.path=/h2-console

# Thymeleaf Configuration
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML

# Static Resources Configuration
spring.web.resources.static-locations=classpath:/static/,classpath:/public/,classpath:/resources/,classpath:/META-INF/resources/
spring.web.resources.cache.period=3600

# Mail Configuration
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Midtrans Configuration
midtrans.server.key=${MIDTRANS_SERVER_KEY:}
midtrans.client.key=${MIDTRANS_CLIENT_KEY:}
midtrans.api.url=${MIDTRANS_API_URL:https://app.sandbox.midtrans.com/snap/v1}
midtrans.payment.notification.url=${MIDTRANS_NOTIFICATION_URL:https://ebookmurah.store/api/payment/notification}
midtrans.payment.finish.url=${MIDTRANS_FINISH_URL:https://ebookmurah.store/payment/success}
midtrans.payment.unfinish.url=${MIDTRANS_UNFINISH_URL:https://ebookmurah.store/payment/unfinish}
midtrans.payment.error.url=${MIDTRANS_ERROR_URL:https://ebookmurah.store/payment/error}

# JWT Secret (for token generation if needed)
app.jwt.secret=${JWT_SECRET:your-secret-key-change-this-in-production}
app.jwt.expiration=${JWT_EXPIRATION:86400000}

# File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Logging
logging.level.com.ebookmurah=INFO
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG
